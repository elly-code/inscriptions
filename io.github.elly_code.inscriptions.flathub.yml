id: io.github.elly_code.inscriptions
# elementary SDK is not available on Flathub, so use the elementary BaseApp instead
base: io.elementary.BaseApp
base-version: circe-25.08
runtime: org.gnome.Platform
runtime-version: '49'
sdk: org.gnome.Sdk
command: io.github.elly_code.inscriptions

finish-args:
  - --share=ipc
  - --device=dri
  - --socket=fallback-x11
  - --socket=wayland
  # Required for communication with external API
  - --share=network

cleanup:
  - /include
  - /lib/girepository-1.0
  - /lib/pkgconfig
  - /share/gir-1.0
  - /share/vala

# Cleanup development-related files inherited from the BaseApp to reduce package size of your app.
cleanup-commands:
  - /app/cleanup-BaseApp.sh

modules:
  - name: inscriptions
    buildsystem: meson
    sources:
      - type: git
        url: https://github.com/elly-code/inscriptions.git
        tag: 1.1.2-2
        commit: 43308c847e8523e1904819c47d24eeecc07f8541
        x-checker-data:
          type: git
          tag-pattern: '^([\d.]+)$'